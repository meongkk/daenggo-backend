spring.application.name=daenggo

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

auth.jwt.secret=${JWT_SECRET}
auth.jwt.issuer=${JWT_ISSUER:daenggo-api}
auth.jwt.access-token-expiration-seconds=${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
auth.refresh-token-expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:14}
